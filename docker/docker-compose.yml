services:
  pyroscope:
    image: grafana/pyroscope:2.1.0
    ports:
      - "4040:4040"
    command:
      - "-log.level=info"
      - "-storage.backend=filesystem"
      - "-storage.filesystem.dir=/data"
    volumes:
      - pyroscope-data:/data

  demo:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    ports:
      - "9501:9501"
    environment:
      PYROSCOPE_APP_NAME: my-shop-api
      PYROSCOPE_ENDPOINT: http://pyroscope:4040
      PYROSCOPE_INTERVAL: 2
      PYROSCOPE_WALL: "1"
    depends_on:
      - pyroscope

volumes:
  pyroscope-data:
